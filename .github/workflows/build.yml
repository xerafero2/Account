name: Build Flutter APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          
      - name: Initialize Android Platform
        run: flutter create --platforms=android .
        
      - name: Force SDK 36 on all Plugins (The Fix)
        run: |
          if [ -f "android/build.gradle" ]; then
            cat << 'EOF' >> android/build.gradle
          
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 36
                      }
                  }
              }
          }
          EOF
          fi
          
          if [ -f "android/build.gradle.kts" ]; then
            cat << 'EOF' >> android/build.gradle.kts
          
          subprojects {
              afterEvaluate {
                  if (project.hasProperty("android")) {
                      val ext = project.extensions.getByName("android") as com.android.build.gradle.BaseExtension
                      ext.compileSdkVersion(36)
                  }
              }
          }
          EOF
          fi
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
