name: Build Flutter APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          
      - name: Initialize Android Platform
        run: flutter create --platforms=android .
        
      - name: Get Dependencies
        run: flutter pub get

      - name: Add Icon
        run: flutter pub run flutter_launcher_icons
        
      - name: Set Package Name & Fix Directories
        run: |
          # Ganti applicationId
          sed -i 's/applicationId ".*"/applicationId "com.securevault.accmanager"/' android/app/build.gradle
          
          # Hapus folder example jika ada
          rm -rf android/app/src/main/kotlin/com/example
          
          # Buat struktur folder baru
          mkdir -p android/app/src/main/kotlin/com/securevault/accmanager
          
          # Pindahkan MainActivity.kt ke folder baru
          find android/app/src/main/kotlin -name "MainActivity.kt" -exec mv {} android/app/src/main/kotlin/com/securevault/accmanager/ \;
          
      - name: Force Android SDK 36 (Brute Force Cache Patch)
        run: |
          echo "Patching App SDK..."
          find android/ -type f -name "build.gradle*" -exec sed -i 's/flutter.compileSdkVersion/36/g' {} +
          find android/ -type f -name "build.gradle*" -exec sed -i 's/flutter.targetSdkVersion/36/g' {} +
          
          echo "Patching All Plugins in Cache..."
          CACHE_DIRS="$HOME/.pub-cache /opt/hostedtoolcache"
          for DIR in $CACHE_DIRS; do
            if [ -d "$DIR" ]; then
              echo "Scanning $DIR..."
              find "$DIR" -type f -name "build.gradle*" -exec sed -i -E 's/compileSdkVersion [0-9]+/compileSdkVersion 36/g' {} +
              find "$DIR" -type f -name "build.gradle*" -exec sed -i -E 's/compileSdk [0-9]+/compileSdk 36/g' {} +
              find "$DIR" -type f -name "build.gradle*" -exec sed -i -E 's/compileSdk = [0-9]+/compileSdk = 36/g' {} +
            fi
          done
          
      - name: Build APK
        run: flutter build apk --release
        
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
