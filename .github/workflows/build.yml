name: Build Flutter APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Setup Android Platform & Dependencies
        run: |
          flutter create --platforms=android .
          flutter pub get

      - name: Generate App Icon
        run: flutter pub run flutter_launcher_icons

      - name: Set Package Name & Fix Directories
        run: |
          if [ ! -f android/app/build.gradle ]; then
            flutter create --platforms=android .
          fi
          sed -i 's/applicationId ".*"/applicationId "com.securevault.accmanager"/' android/app/build.gradle
          rm -rf android/app/src/main/kotlin/com/example
          mkdir -p android/app/src/main/kotlin/com/securevault/accmanager
          find android/app/src/main/kotlin -name "MainActivity.kt" -exec mv {} android/app/src/main/kotlin/com/securevault/accmanager/ \; || true
          if [ ! -f android/app/src/main/kotlin/com/securevault/accmanager/MainActivity.kt ]; then
            echo 'package com.securevault.accmanager
import io.flutter.embedding.android.FlutterActivity
class MainActivity: FlutterActivity()' > android/app/src/main/kotlin/com/securevault/accmanager/MainActivity.kt
          fi

      - name: Force SDK 36 & Build
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
