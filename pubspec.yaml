name: accountmanager
description: A secure offline App for managing your accounts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  otp: ^3.1.2
  image_picker: ^1.0.7
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  file_picker: ^8.0.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
