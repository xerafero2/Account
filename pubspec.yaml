name: social_media_manager
description: A premium Social Media Manager offline vault.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  otp: ^3.1.2
  image_picker: ^1.0.7
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  file_picker: ^8.0.3 # Tambahkan ini untuk akses file & direktori
  path_provider: ^2.1.3 # Tambahkan ini untuk akses direktori sistem

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
